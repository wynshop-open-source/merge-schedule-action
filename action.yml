name: Merge Schedule
description: "merge pull requests on a scheduled day"
branding:
  icon: "git-merge"
  color: purple
runs:
  using: "node20"
  main: "dist/index.js"
inputs:
  merge_method:
    description: |-
      Merge method to use. Possible values are `merge`, `squash` or
      `rebase`. Default is `merge`.
    required: false
    default: merge
  time_zone:
    description: |-
      Time zone to use. Default is UTC.
    required: false
    default: UTC
  require_statuses_success:
    description: |-
      Require all pull request statuses to be successful before
      merging. Default is `false`.
    required: false
    default: 'false'
  automerge_fail_label:
    description: |-
      Label to apply to the pull request if the merge fails. Default is
      `automerge-fail`.
    required: false
    default: 'automerge-fail'
  check_mergeability:
    description: |-
      Check if the pull request is mergeable before scheduling it. Default is
      `false`. This incurs an additional API call per PR.
    required: false
    default: 'false'
outputs:
  scheduled_pull_requests:
    description: "An array of the pull requests that are scheduled to be merged"
  unmergeable_pull_requests:
    description: "An array of the pull requests that are scheduled to be merged, but are not currently mergeable"
  merged_pull_requests:
    description: "An array of the pull requests that were successfully merged"
  failed_pull_requests:
    description: "An array of the pull requests that could not be successfully merged"
